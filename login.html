.login-card{
  background:rgba(22,22,22,0.65);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--border);
  border-radius:16px;
  padding:48px 40px;
  width:440px;
  max-width:95vw;
  box-shadow:0 20px 60px rgba(0,0,0,.8), 0 0 0 1px rgba(196,18,48,.1);
  position:relative;
  overflow:hidden;
}
.login-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:4px;
  background:linear-gradient(90deg,var(--red),var(--gold),var(--red));
}
.login-logo{
  text-align:center;
  margin-bottom:36px;
}
.login-logo h1{
  font-family:'Oswald',sans-serif;
  font-size:2rem;
  letter-spacing:.05em;
  color:#fff;
  text-transform:uppercase;
  line-height:1.2;
}
.login-logo p{
  color:var(--red);
  font-size:.85rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  margin-top:6px;
}
.field-label{
  display:block;
  font-size:.8rem;
  font-weight:600;
  color:var(--text2);
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:8px;
}
.login-input{
  width:100%;
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:8px;
  padding:14px 16px;
  color:var(--text1);
  outline:none;
  margin-bottom:20px;
  font-size:1rem;
  font-family:'Noto Sans Armenian',sans-serif;
  transition:.2s border-color;
}
.login-input:focus{
  border-color:var(--red);
}
.login-btn{
  width:100%;
  padding:15px;
  background:var(--red);
  border:none;
  border-radius:8px;
  color:#fff;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  cursor:pointer;
  font-size:1rem;
  font-family:'Noto Sans Armenian',sans-serif;
  transition:.2s background;
  margin-top:4px;
}
.login-btn:hover:not(:disabled){
  background:var(--red-light);
}
.login-btn:disabled{
  opacity:.6;
  cursor:not-allowed;
}
.login-error{
  color:#ff6b6b;
  text-align:center;
  margin-top:14px;
  min-height:20px;
  font-size:.88rem;
}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <h1>ArmPride</h1>
    <p>Հայաստանի Հպարտություն</p>
  </div>

  <label class="field-label" for="email">Էլեկտրոնային փոստ</label>
  <input type="email" id="email" class="login-input" placeholder="your@email.com">

  <label class="field-label" for="password">Գաղտնաբառ</label>
  <input type="password" id="password" class="login-input" placeholder="••••••••">

  <button class="login-btn" id="login-btn" onclick="handleLogin()">Մուտք գործել</button>
  <div id="login-error" class="login-error"></div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://vzouzbybkbbaiupubfmj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6b3V6Ynlia2JiYWl1cHViZm1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjE3MjksImV4cCI6MjA5NTc5NzcyOX0.fVuREjAgEPNDasy-dxZlq603ilZNOIgxFuAU9q_fqgE'
);

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  errorDiv.textContent = '';

  if (!email || !password) {
    errorDiv.textContent = 'Խնդրում ենք լրացնել բոլոր դաշտերը';
    return;
  }

  btn.textContent = 'Մուտք...';
  btn.disabled = true;

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    window.location.replace('index.html');
  } catch (err) {
    errorDiv.textContent = err.message || 'Սխալ մուտք';
    btn.textContent = 'Մուտք գործել';
    btn.disabled = false;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
});

(async () => {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    window.location.replace('index.html');
  }
})();
</script>
</body>
</html>
